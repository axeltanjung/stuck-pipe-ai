version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: stuckpipe-backend
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - DATABASE_URL=sqlite:///./data/stuckpipe.db
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MODEL_PATH=/app/data/models
    volumes:
      - ./data:/app/data
    depends_on:
      - mlflow
    networks:
      - stuckpipe-net
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: stuckpipe-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - stuckpipe-net
    restart: unless-stopped

  mlflow:
    build:
      context: .
      dockerfile: docker/mlflow.Dockerfile
    container_name: stuckpipe-mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./mlflow/artifacts:/mlflow/artifacts
      - ./mlflow/db:/mlflow/db
    networks:
      - stuckpipe-net
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: stuckpipe-nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - stuckpipe-net
    restart: unless-stopped

networks:
  stuckpipe-net:
    driver: bridge
